<!--Form para agregar cuenta-->
<div class="container mt-5 pt-5" style="max-width: 700px;">
    <div class="card shadow-sm border-0 rounded-4">

        <!-- Header azul -->
        <div class="card-header bg-primary text-white rounded-top-4 py-3">
            <h4 class="mb-0">
                <i class="fa-solid fa-plus me-2"></i>
                Agregar Cuenta Contable
            </h4>
        </div>

        <div class="card-body p-4">
            <form action="../../dynamicview/cuentascontables/agregar.php" method="get">

                <!-- Codigo -->
                <div class="mb-3">
                    <label class="form-label fw-bold">
                        <i class="fa-solid fa-hashtag me-1 text-primary"></i>
                        Código de la Cuenta
                    </label>
                    <input name="codigo" type="text" class="form-control" placeholder="Ej: 101">
                </div>

                <!-- Nombre -->
                <div class="mb-3">
                    <label class="form-label fw-bold">
                        <i class="fa-solid fa-file-lines me-1 text-primary"></i>
                        Nombre de la Cuenta
                    </label>
                    <input name="cuenta" type="text" class="form-control" placeholder="Inserte el nombre de la cuenta">
                </div>

                <!-- Tipo de cuenta -->
                <div class="mb-4">
                    <label class="form-label fw-bold">
                        <i class="fa-solid fa-list me-1 text-primary"></i>
                        Tipo de Cuenta
                    </label>
                    <div class="input-group">
                        <span class="input-group-text bg-light">
                            <i class="fa-solid fa-tag text-secondary"></i>
                        </span>
                        <select name="tipo_cuenta" class="form-select">
                            <option value="A">Activo</option>
                            <option value="P">Pasivo</option>
                            <option value="G">Gastos</option>
                            <option value="C">Capital</option>
                            <option value="I">Ingresos</option>
                        </select>
                    </div>
                </div>

                <!-- Boton -->
                <button name="submit" type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm">
                    <i class="fa-solid fa-floppy-disk me-2"></i>Agregar Cuenta
                </button>

            </form>
        </div>
    </div>
</div>
